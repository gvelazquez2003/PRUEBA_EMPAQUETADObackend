services:
  - type: web
    name: empaquetado-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: "false"
      - key: DB_CONNECT_TIMEOUT_MS
        value: "10000"
      - key: DB_POOL_MAX
        value: "5"
      - key: ADMIN_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ROUTING_PROVIDER
        value: openrouteservice
      - key: OPENROUTESERVICE_API_KEY
        sync: false
      - key: GOOGLE_GEOCODING_FALLBACK_ENABLED
        value: "false"
      - key: GOOGLE_GEOCODING_API_KEY
        sync: false
      - key: GOOGLE_GEOCODING_DAILY_LIMIT
        value: "250"
      - key: GOOGLE_GEOCODING_MONTHLY_LIMIT
        value: "9000"
      - key: GOOGLE_GEOCODING_CACHE_DAYS
        value: "30"
